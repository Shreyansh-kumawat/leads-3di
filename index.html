<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3Digree &ndash; Leads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f6ff;
      font-family: 'Inter', sans-serif;
      color: #1a1a2e;
      padding: 1.5rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d0e4f7;
      border-radius: 16px;
      padding: 2.75rem 2.5rem 2.25rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 28px rgba(30, 100, 200, 0.08);
    }

    .logo-wrap {
      margin-bottom: 1.5rem;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: #e8f1fd;
      border-radius: 14px;
      margin-bottom: 0.75rem;
    }

    .brand {
      font-size: 1.55rem;
      font-weight: 700;
      color: #1a6fdb;
      letter-spacing: -0.5px;
    }

    .divider {
      border: none;
      border-top: 1px solid #e4eef9;
      margin: 1.5rem 0;
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 0.6rem;
      line-height: 1.4;
    }

    p {
      font-size: 0.88rem;
      color: #5a7a9a;
      line-height: 1.7;
      max-width: 34ch;
      margin: 0 auto 1.75rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      background: #1a6fdb;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.7rem 1.75rem;
      border-radius: 9px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.18s;
      width: 100%;
    }
    .btn:hover { background: #1558b8; }
    .btn:active { background: #0f409e; }

    footer {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: #9bb0cc;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-wrap">
      <div class="logo">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1a6fdb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <div class="brand">3Digree</div>
    </div>

    <hr class="divider" />

    <h1>Your Leads Are Ready</h1>
    <p>We&rsquo;ve curated a set of qualified local business leads, just as discussed. Click below to access your report.</p>

    <a class="btn" href="/confirm-password">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Access Leads Report
    </a>
  </div>

  <footer>3Digree &nbsp;&middot;&nbsp; Confidential</footer>

</body>
</html>
