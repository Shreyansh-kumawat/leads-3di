<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>leads-3di</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-text: #28251d;
      --color-text-muted: #7a7974;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'Work Sans', 'Helvetica Neue', sans-serif;
    }

    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-text: #cdccca;
      --color-text-muted: #797876;
      --color-primary: #4f98a3;
      --color-primary-hover: #227f8b;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      transition: background 0.3s, color 0.3s;
    }

    .card {
      background: var(--color-surface);
      border: 1px solid oklch(from var(--color-text, #28251d) l c h / 0.1);
      border-radius: 1rem;
      padding: clamp(2rem, 5vw, 3.5rem) clamp(1.5rem, 6vw, 4rem);
      text-align: center;
      max-width: 520px;
      width: 90%;
      box-shadow: 0 4px 24px oklch(0.2 0.01 80 / 0.08);
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-primary);
      background: oklch(from var(--color-primary) l c h / 0.1);
      border-radius: 9999px;
      padding: 0.3rem 0.9rem;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw + 1rem, 4.5rem);
      line-height: 1.1;
      color: var(--color-text);
      margin-bottom: 1rem;
      font-style: italic;
    }

    h1 span {
      color: var(--color-primary);
    }

    p {
      color: var(--color-text-muted);
      font-size: clamp(0.95rem, 1vw + 0.5rem, 1.1rem);
      line-height: 1.7;
      max-width: 38ch;
      margin: 0 auto;
    }

    .toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      background: var(--color-surface);
      border: 1px solid oklch(from var(--color-text, #28251d) l c h / 0.12);
      border-radius: 9999px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-text);
      box-shadow: 0 1px 4px oklch(0.2 0.01 80 / 0.06);
      transition: background 0.2s, color 0.2s;
    }
    .toggle:hover { background: var(--color-primary); color: #fff; }
  </style>
</head>
<body>

  <button class="toggle" data-theme-toggle aria-label="Toggle dark mode">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
  </button>

  <div class="card">
    <div class="badge">leads-3di</div>
    <h1>Hello, <span>World!</span></h1>
    <p>Welcome to leads-3di — your project is live and ready to grow. 🚀</p>
  </div>

  <script>
    (function(){
      const t = document.querySelector('[data-theme-toggle]');
      const r = document.documentElement;
      let d = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      r.setAttribute('data-theme', d);
      t && t.addEventListener('click', () => {
        d = d === 'dark' ? 'light' : 'dark';
        r.setAttribute('data-theme', d);
        t.innerHTML = d === 'dark'
          ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
          : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      });
    })();
  </script>

</body>
</html>
