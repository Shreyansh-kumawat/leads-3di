<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3Digree – Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f6ff;
      font-family: 'Inter', sans-serif;
      color: #1a1a2e;
    }
    .card {
      background: #ffffff;
      border: 1px solid #d0e4f7;
      border-radius: 14px;
      padding: 2.5rem 2.25rem;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(30, 100, 200, 0.07);
      text-align: center;
    }
    .brand {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a6fdb;
      letter-spacing: -0.5px;
      margin-bottom: 0.35rem;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #6b8aad;
      margin-bottom: 2rem;
    }
    label {
      display: block;
      text-align: left;
      font-size: 0.8rem;
      font-weight: 500;
      color: #4a6080;
      margin-bottom: 0.4rem;
    }
    .input-wrap {
      position: relative;
      margin-bottom: 1.25rem;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 0.7rem 2.75rem 0.7rem 0.9rem;
      border: 1.5px solid #c4d8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      background: #f7faff;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #1a6fdb; background: #fff; }
    .eye-btn {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #6b8aad;
      display: flex;
      align-items: center;
      padding: 0;
    }
    .eye-btn:hover { color: #1a6fdb; }
    .error-msg {
      font-size: 0.78rem;
      color: #e03a3a;
      margin-top: -0.75rem;
      margin-bottom: 1rem;
      text-align: left;
      display: none;
    }
    .error-msg.show { display: block; }
    button.submit {
      width: 100%;
      padding: 0.75rem;
      background: #1a6fdb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.submit:hover { background: #1558b8; }
    button.submit:active { background: #0f409e; }
    .lock-icon {
      margin: 0 auto 1.25rem;
      width: 46px;
      height: 46px;
      background: #e8f1fd;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="lock-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a6fdb" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="brand">3Digree</div>
    <div class="subtitle">Enter your access password to continue</div>
    <label for="pwd">Password</label>
    <div class="input-wrap">
      <input type="password" id="pwd" placeholder="Enter password" autocomplete="current-password" />
      <button class="eye-btn" type="button" id="toggleEye" aria-label="Show password">
        <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <div class="error-msg" id="errMsg">Incorrect password. Please try again.</div>
    <button class="submit" id="submitBtn">Unlock Access</button>
  </div>

  <script>
    const CORRECT = '3di-5(&fs!dmc4';
    const eyeBtn = document.getElementById('toggleEye');
    const pwdInput = document.getElementById('pwd');
    const errMsg = document.getElementById('errMsg');
    const eyeIcon = document.getElementById('eyeIcon');

    eyeBtn.addEventListener('click', () => {
      const isHidden = pwdInput.type === 'password';
      pwdInput.type = isHidden ? 'text' : 'password';
      eyeIcon.innerHTML = isHidden
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });

    function unlock() {
      const val = pwdInput.value;
      if (val === CORRECT) {
        errMsg.classList.remove('show');
        sessionStorage.setItem('3di_access', '1');
        window.location.href = '/fh83-user-028-leads-rs-1000';
      } else {
        errMsg.classList.add('show');
        pwdInput.value = '';
        pwdInput.focus();
      }
    }

    document.getElementById('submitBtn').addEventListener('click', unlock);
    pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
  </script>
</body>
</html>
